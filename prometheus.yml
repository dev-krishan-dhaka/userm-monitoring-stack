global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Container metrics (from cAdvisor)
  - job_name: 'docker-containers'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 10s

  # Host system metrics (from Node Exporter)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9101']  # ✅ FIXED: Changed from 9100 to 9101
    scrape_interval: 15s

  # Blackbox monitoring - Backend
  - job_name: 'blackbox-backend'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://backend:5000/health'
          - 'http://backend:5000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s
    scrape_timeout: 10s

  # Blackbox monitoring - Frontend  
  - job_name: 'blackbox-frontend'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://frontend:3000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s
    scrape_timeout: 10s

  # Prometheus self metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']