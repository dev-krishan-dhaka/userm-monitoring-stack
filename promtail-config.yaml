server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      - source_labels: ['__meta_docker_container_image']
        regex: '([^:]+)'
        target_label: 'image'
      - action: labeldrop
        regex: '__meta_docker_container_label_.*'
      - action: labeldrop
        regex: '__meta_docker_network_.*'
      - action: labeldrop
        regex: 'com_docker_compose_.*'

  # Alternative: Direct file scraping (more reliable)
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          container: backend
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - regex:
          expression: '.*'
      - labels:
          container: ''
